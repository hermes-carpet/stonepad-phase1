name: stonepad
description: "Stonepad - Self-hostable markdown notes with mobile sync"
publish_to: 'none'
version: 0.0.3

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  connectivity_plus: ^7.1.1
  minio: ^3.5.2
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4
  file_picker: ^11.0.2
  crypto: ^3.0.6
  http: ^1.3.0
  flutter_markdown_plus: ^1.0.7
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  dbus: ^0.7.13
  matcher: ^0.12.20
  meta: ^1.18.2
  test_api: ^0.7.12
  vector_math: ^2.3.0
  xml: ^7.0.1

flutter:
  uses-material-design: true
