name: stonepad
description: "Stonepad - Self-hostable markdown notes with mobile sync"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  connectivity_plus: ^6.1.3
  minio: ^3.5.2
  path_provider: ^2.1.5
  crypto: ^3.0.6
  http: ^1.3.0
  flutter_markdown_plus: ^1.0.7
  window_manager: ^0.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
