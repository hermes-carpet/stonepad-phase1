version: '3.8'
services:
  stonepad-server:
    image: ghcr.io/hermes-carpet/stonepad-server:latest
    container_name: stonepad-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data/persist:/data/persist
    tmpfs:
      - /data:size=128M,mode=1777
    environment:
      NOTES_LISTEN_ADDR: ":8080"
      NOTES_DATA_DIR: "/data"
      NOTES_STORAGE_MODE: "tmpfs"
      NOTES_TMPFS_PERSIST_DIR: "/data/persist"
      NOTES_TMPFS_SNAPSHOT_INTERVAL: "300"
      NOTES_AUTH_MODE: "none"
      NOTES_LOG_LEVEL: "info"
