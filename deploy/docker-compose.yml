version: '3.8'
services:
  stonepad-server:
    image: ghcr.io/hermes-carpet/stonepad-server:main
    container_name: stonepad-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Notes + SQLite + credentials (bind mount — survives container recreation)
      - ./data:/data
      # Temp directory (named volume — customizable, not tmpfs)
      - tmp-vol:/tmp
    environment:
      NOTES_LISTEN_ADDR: ":8080"
      NOTES_DATA_DIR: "/data"
      NOTES_STORAGE_MODE: "direct"
      NOTES_AUTH_MODE: "token"
      NOTES_AUTH_TOKEN: "${NOTES_AUTH_TOKEN:-change-me}"
      NOTES_LOG_LEVEL: "info"

volumes:
  tmp-vol:
    # Named volume for /tmp — users can replace with a bind mount
    # to a custom path if needed, e.g.:
    #   volumes:
    #     - /some/custom/tmp/path:/tmp
