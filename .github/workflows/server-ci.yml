name: Server CI

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/server-ci.yml'
      - 'schema/sqlite-init.sql'
  pull_request:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/server-ci.yml'
      - 'schema/sqlite-init.sql'
  workflow_dispatch:

env:
  GO_VERSION: '1.26'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-server

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: go vet
        run: go vet ./...
      - name: gofmt check
        run: test -z "$(gofmt -l .)"

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests with coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Report coverage
        run: go tool cover -func=coverage.out | tail -1

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux go build \
            -ldflags="-w -s -X main.version=$(cat VERSION 2>/dev/null || echo dev)" \
            -o /tmp/stonepad-server ./cmd/stonepad-server
      - name: Check binary size
        run: |
          SIZE=$(stat -c%s /tmp/stonepad-server)
          echo "Binary size: $SIZE bytes ($(echo "scale=1; $SIZE/1048576" | bc) MB)"
      - name: Build Docker image
        run: docker build -t stonepad-server:ci .

  docker-push:
    name: Push to GHCR
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, test, build]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=sha,prefix=,format=short
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-alpha.')
    needs: [lint, test, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build multi-arch binaries
        run: |
          VERSION_TAG=${GITHUB_REF#refs/tags/}
          mkdir -p /tmp/release
          for ARCH in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH=$ARCH go build \
              -ldflags="-w -s -X main.version=${VERSION_TAG#v}" \
              -o /tmp/release/stonepad-server_linux_$ARCH ./cmd/stonepad-server
          done
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/release/*
