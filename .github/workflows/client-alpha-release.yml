name: Client Alpha Release

on:
  workflow_run:
    workflows: ["Client CI"]
    types: [completed]
    branches: [main]

jobs:
  alpha-release:
    name: Publish Alpha APK
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout (for tag computation only)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Read version
        id: version
        run: |
          VER=$(grep '^version:' client/pubspec.yaml | awk '{print $2}')
          echo "ver=$VER" >> $GITHUB_OUTPUT
          echo "pubspec version: $VER"

      - name: Compute tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          TAG="v${{ steps.version.outputs.ver }}-${SHORT_SHA}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "tag=$TAG"

      - name: Download APK from CI
        uses: dawidd6/action-download-artifact@v4
        with:
          workflow: client-ci.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: stonepad-apk
          path: /tmp/apk

      - name: Verify APK
        run: |
          APK=$(ls /tmp/apk/stonepad-*.apk 2>/dev/null | head -1)
          echo "=== APK verification ==="
          if [ -z "$APK" ] || [ ! -f "$APK" ]; then
            echo "ERROR: APK not found in /tmp/apk/"
            ls -la /tmp/apk/
            exit 1
          fi
          echo "APK: $APK"
          SIZE=$(stat -c%s "$APK")
          echo "Size: $SIZE bytes ($(echo "scale=1; $SIZE/1048576" | bc) MB)"
          if [ "$SIZE" -lt 10000000 ]; then
            echo "ERROR: APK too small (< 10 MB), likely corrupted"
            exit 1
          fi
          # Verify it's a valid ZIP (APK is ZIP)
          if ! unzip -t "$APK" > /dev/null 2>&1; then
            echo "ERROR: APK is not a valid ZIP archive"
            exit 1
          fi
          echo "APK is valid ZIP"
          echo "=== Verification passed ==="
          echo "apk_path=$APK" >> $GITHUB_ENV

      - name: Publish alpha release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Stonepad ${{ steps.tag.outputs.tag }}"
          body: |
            ⚠️ **Pre-release** — auto-published from CI on `main`.

            | | |
            |---|---
            | Version | `${{ steps.version.outputs.ver }}`
            | Commit | `${{ github.event.workflow_run.head_sha }}`

            **Install**: Download the APK and sideload on Android.
          prerelease: true
          make_latest: false
          files: ${{ env.apk_path }}
