name: Client Alpha Release

on:
  workflow_run:
    workflows: ["Client CI"]
    types: [completed]
    branches: [main]

env:
  FLUTTER_VERSION: '3.44'

jobs:
  alpha-release:
    name: Build and Publish Alpha APK
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout triggering commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Read version
        id: version
        run: |
          VER=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "ver=$VER" >> $GITHUB_OUTPUT
          echo "pubspec version: $VER"

      - name: Compute tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          TAG="v${{ steps.version.outputs.ver }}-${SHORT_SHA}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "tag=$TAG"

      - run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release \
            --build-number=${{ github.event.workflow_run.run_number }}

      - name: Publish alpha release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Stonepad ${{ steps.tag.outputs.tag }}"
          body: |
            ⚠️ **Pre-release** — auto-published from CI on `main`.

            | | |
            |---|---|
            | Version | `${{ steps.version.outputs.ver }}` |
            | Version code | `${{ github.event.workflow_run.run_number }}` |
            | Commit | `${{ github.event.workflow_run.head_sha }}` |

            **Install**: Download the APK and sideload on Android.
          prerelease: true
          make_latest: false
          files: client/build/app/outputs/flutter-apk/app-release.apk
