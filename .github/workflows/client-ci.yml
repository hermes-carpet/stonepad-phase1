name: Client CI

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/client-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/client-ci.yml'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.44'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get
      - name: flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get
      - name: Run tests
        run: flutter test --coverage
      - name: Report coverage
        run: |
          if [ -f coverage/lcov.info ]; then
            echo "Coverage report generated"
          fi

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: flutter clean
      - run: flutter pub get
      - name: Read version
        id: version
        run: |
          VER=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "ver=$VER" >> $GITHUB_OUTPUT
      - name: Build APK
        run: flutter build apk --release --build-number=$(date +%s)
      - name: Rename APK
        run: |
          SRC=build/app/outputs/flutter-apk/app-release.apk
          DST=build/app/outputs/flutter-apk/stonepad-${{ steps.version.outputs.ver }}-universal.apk
          mv "$SRC" "$DST"
          echo "APK: $DST ($(stat -c%s "$DST") bytes)"
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: stonepad-apk
          path: client/build/app/outputs/flutter-apk/stonepad-*.apk

  build-linux:
    name: Build Linux (smoke test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Install Linux deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake clang ninja-build pkg-config libgtk-3-dev liblzma-dev
      - run: flutter pub get
      - name: Build Linux
        run: flutter build linux



