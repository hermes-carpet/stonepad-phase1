name: Server Alpha Release

on:
  workflow_run:
    workflows: ["Server CI"]
    types: [completed]
    branches: [main]

env:
  GO_VERSION: '1.26'

jobs:
  alpha-release:
    name: Build and Publish Alpha Binary
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout triggering commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Read version
        id: version
        run: |
          VER=$(cat VERSION)
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Full version: $VER"

      - name: Compute alpha tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          TAG="v${{ steps.version.outputs.version }}-alpha.${SHORT_SHA}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Alpha tag: $TAG"

      - name: Build multi-arch binaries
        run: |
          mkdir -p /tmp/release
          for ARCH in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH=$ARCH go build \
              -ldflags="-w -s -X main.version=${{ steps.version.outputs.version }}-alpha" \
              -o /tmp/release/stonepad-server_linux_$ARCH ./cmd/stonepad-server
          done
          echo "Built binaries:"
          ls -lh /tmp/release/

      - name: Publish alpha release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Stonepad Server ${{ steps.tag.outputs.tag }}"
          body: |
            ⚠️ **Alpha release** — auto-published from successful CI on `main`.

            | | |
            |---|---|
            | Commit | `${{ github.event.workflow_run.head_sha }}` |
            | Base version | `${{ steps.version.outputs.version }}` |
            | Triggered by | [${{ github.event.workflow_run.name }} #${{ github.event.workflow_run.run_number }}](${{ github.event.workflow_run.html_url }}) |

            ### Binaries
            - `stonepad-server_linux_amd64` — x86_64
            - `stonepad-server_linux_arm64` — ARM64 (Raspberry Pi, etc.)
          prerelease: true
          make_latest: false
          files: /tmp/release/*
